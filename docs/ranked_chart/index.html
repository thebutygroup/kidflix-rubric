 and Anita, and Pongo and Perdita, is\u003cbr\u003epresent and warm but is a backdrop to the rescue plot rather than the prize, landing in\u003cbr\u003ethe balanced middle band.","\u003cb\u003eRobin Hood\u003c\u002fb\u003e (1973, G)\u003cbr\u003eRubric \u003cb\u003e50\u003c\u002fb\u003e\u002f100 | Audience 81.0% | Critics 58.0% | $190M adj\u003cbr\u003e\u003ci\u003eThe 1973 Disney animated Robin Hood is fundamentally a story about a folk hero whose\u003cbr\u003eentire identity is tied to noble birth (he is literally a fox of aristocratic lineage\u003cbr\u003ereclaiming a world of lords and kings), and the endorsed reward is restoring the monarchy\u003cbr\u003eand marrying Maid Marian \u2014 a princess. The emotional core has genuine warmth around\u003cbr\u003ejustice for the poor, but the structural logic is deeply status-driven.\u003c\u002fi\u003e\u003cbr\u003e\u003cbr\u003e\u003cb\u003eWealth 8\u002f40\u003c\u002fb\u003e: Robin is a nobleman-outlaw whose heroism is inseparable from his\u003cbr\u003earistocratic identity, and the climax restores royal order under King Richard \u2014 status\u003cbr\u003eascension and monarchical legitimacy are the endorsed reward, placing this firmly near\u003cbr\u003ethe bottom of the scale; scored slightly above Cinderella\u002fAladdin because Robin does\u003cbr\u003eperform active deeds rather than simply being elevated by birth alone.\u003cbr\u003e\u003cb\u003eAgency 13\u002f17\u003c\u002fb\u003e: Robin drives most of his own plans \u2014 the archery tournament gambit,\u003cbr\u003ethe jailbreak \u2014 but the final resolution depends heavily on King Richard's timely return\u003cbr\u003eto impose justice, splitting the solving between Robin's agency and deus-ex-monarch\u003cbr\u003erescue.\u003cbr\u003e\u003cb\u003eCore 13\u002f17\u003c\u002fb\u003e: There is a genuine theme of justice for the oppressed poor versus\u003cbr\u003ecorrupt authority, which gives the film real substance, but it is relatively simple and\u003cbr\u003enever deepens into identity or grief territory.\u003cbr\u003e\u003cb\u003eMusic 8\u002f10\u003c\u002fb\u003e: Roger Miller's folk-country songs ('Oo-de-lally', 'Not in Nottingham')\u003cbr\u003ecarry mood and narrative efficiently but are few in number and leave large stretches of\u003cbr\u003escore-only storytelling.\u003cbr\u003e\u003cb\u003eInclusion 5\u002f10\u003c\u002fb\u003e: Band 5\u002f10 (Neutral): The all-animal cast sidesteps human\u003cbr\u003edemographic representation entirely; no group is harmed or stereotyped in a meaningful\u003cbr\u003eway, but no inclusion lesson is taught either.\u003cbr\u003e\u003cb\u003eRomance 3\u002f6\u003c\u002fb\u003e: Maid Marian is a prize and the marriage at the end is a celebrated\u003cbr\u003ereward, but Robin's primary motivation throughout is justice for the poor rather than\u003cbr\u003ewinning her hand, making it present-but-balanced rather than the sole prize."],"marker":{"color":["#2e7d32","#2e7d32","#2e7d32","#2e7d32","#2e7d32","#2e7d32","#2e7d32","#2e7d32","#2e7d32","#2e7d32","#2e7d32","#2e7d32","#7cb342","#2e7d32","#7cb342","#7cb342","#7cb342","#7cb342","#7cb342","#7cb342","#7cb342","#7cb342","#7cb342","#7cb342","#7cb342","#7cb342","#7cb342","#7cb342","#7cb342","#7cb342","#7cb342","#7cb342","#fbc02d","#fbc02d","#fbc02d","#fbc02d","#fbc02d","#fbc02d","#fbc02d","#fbc02d","#fbc02d","#fb8c00","#fb8c00","#fb8c00","#fb8c00","#fb8c00","#e64a19","#b71c1c","#b71c1c","#b71c1c","#b71c1c","#7cb342","#7cb342","#7cb342","#7cb342","#7cb342","#7cb342","#7cb342","#7cb342","#7cb342","#fbc02d","#fbc02d","#fbc02d","#fbc02d","#fb8c00","#fbc02d","#fb8c00","#fb8c00","#fb8c00","#e64a19","#b71c1c","#fb8c00","#e64a19","#fbc02d","#fb8c00"],"line":{"color":"black","width":1},"opacity":0.85,"size":[27.25231468252456,16.375,16.762812094883316,11.800716092417879,14.629097259833564,25.75,20.69306393762915,23.641908694617936,22.219744577357403,27.6155281280883,29.887291779500693,38.95455757791054,32.13246157860387,9.99739470207045,11.84122918 7,25,26,37,31,20,38,21,44,75,32,39,27,50,58,51,16,17,84,76,45,48,66,59,64,68,83,40,34,18,13,19,56,35,63,60,69,33,22,54,57,52,61,86,72,77,78,88,90,79,87,91,85,70,89,92,93,80,65,55],"y":[1,2,3,4,8,5,6,9,7,10,11,13,16,14,17,22,19,20,21,23,24,25,28,26,30,35,29,31,33,42,40,41,52,55,56,57,58,61,65,66,67,68,71,73,77,81,83,88,91,92,93,36,32,38,34,47,43,27,37,44,59,62,63,64,70,48,75,78,79,86,89,72,85,50,76],"type":"scatter"},{"customdata":[["Rocky",1250.0,91],["American History X",47.0,90],["Shawshank Redemption",156.0,89],["Parasite",326.0,82],["Trainspotting",145.0,76],["There Will Be Blood",116.0,76],["The Big Lebowski",92.0,74],["Pulp Fiction",456.0,72],["Fight Club",192.0,71],["Titanic",4483.0,71],["Forrest Gump",1451.0,68],["The Matrix",887.0,59],["The Dark Knight",1479.0,52],["American Gangster",409.0,49],["The Godfather",1900.0,47],["Goodfellas",114.0,42],["Scarface",211.0,34],["The Wolf of Wall Street",554.0,27]],"hoverinfo":"text","hoverlabel":{"align":"left","font":{"size":11}},"hovertext":["\u003cb\u003eRocky\u003c\u002fb\u003e (1976, PG)\u003cbr\u003eRubric \u003cb\u003e91\u003c\u002fb\u003e\u002f100 | Audience 90.0% | Critics 92.0% | $1250M adj\u003cbr\u003e\u003ci\u003eBroke club fighter; the grind IS the movie; goal is 'going the distance' not winning\u003cbr\u003eor riches; Adrian romance tender and mutual.\u003c\u002fi\u003e\u003cbr\u003e\u003cbr\u003e\u003cb\u003eWealth 40\u002f40\u003c\u002fb\u003e: Broke club fighter; the grind is the film\u003cbr\u003e\u003cb\u003eAgency 17\u002f17\u003c\u002fb\u003e: Goes the distance by choice\u003cbr\u003e\u003cb\u003eCore 16\u002f17\u003c\u002fb\u003e: Self-respect over victory\u003cbr\u003e\u003cb\u003eMusic 8\u002f10\u003c\u002fb\u003e: Gonna Fly Now\u003cbr\u003e\u003cb\u003eInclusion 5\u002f10\u003c\u002fb\u003e: Band 5\u002f10 (neutral): working-class Philadelphia; Apollo an equal;\u003cbr\u003eneutral\u003cbr\u003e\u003cb\u003eRomance 5\u002f6\u003c\u002fb\u003e: Adrian, tender and mutual","\u003cb\u003eAmerican History X\u003c\u002fb\u003e (1998, R)\u003cbr\u003eRubric \u003cb\u003e90\u003c\u002fb\u003e\u002f100 | Audience 96.0% | Critics 84.0% | $47M adj\u003cbr\u003e\u003ci\u003eWorking-class family; hate and deradicalization ARE the text; transformation through\u003cbr\u003echosen confrontation with his own beliefs; brutal honest consequences.\u003c\u002fi\u003e\u003cbr\u003e\u003cbr\u003e\u003cb\u003eWealth 38\u002f40\u003c\u002fb\u003e: Working-class family\u003cbr\u003e\u003cb\u003eAgency 15\u002f17\u003c\u002fb\u003e: Chooses transformation in prison\u003cbr\u003e\u003cb\u003eCore 16\u002f17\u003c\u002fb\u003e: Hate and its unlearning\u003cbr\u003e\u003cb\u003eMusic 5\u002f10\u003c\u002fb\u003e: Score\u003cbr\u003e\u003cb\u003eInclusion 10\u002f10\u003c\u002fb\u003e: Band 10\u002f10 (inclusion is the lesson): racism and deradicalization\u003cbr\u003eare the text\u003cbr\u003e\u003cb\u003eRomance 6\u002f6\u003c\u002fb\u003e: None central","\u003cb\u003eShawshank Redemption\u003c\u002fb\u003e (1994, R)\u003cbr\u003eRubric \u003cb\u003e89\u003c\u002fb\u003e\u002f100 | Audience 98.0% | Critics 89.0% | $156M adj\u003cbr\u003e\u003ci\u003eOrdinary man stripped of everything; escape earned through two decades of quiet\u003cbr\u003edepicted work - the ultimate grind; hope and friendship core is elite; no romance.\u003c\u002fi\u003e\u003cbr\u003e\u003cbr\u003e\u003cb\u003eWealth 38\u002f40\u003c\u002fb\u003e: Everything stripped; escape earned over decades\u003cbr\u003e\u003cb\u003eAgency 17\u002f17\u003c\u002fb\u003e: Hope as a discipline\u003cbr\u003e\u003cb\u003eCore 17\u002f17\u003c\u002fb\u003e: Hope, friendship, institutionalization\u003cbr\u003e\u003cb\u003eMusic 5\u002f10\u003c\u002fb\u003e: Score; one Mozart scene\u003cbr\u003e\u003cb\u003eInclusion 6\u002f10\u003c\u002fb\u003e: Band 6\u002f10 (neutral): Red and the prison's shared humanity;\u003cbr\u003eneutral-plus\u003cbr\u003e\u003cb\u003eRomance 6\u002f6\u003c\u002fb\u003e: None","\u003cb\u003eParasite\u003c\u002fb\u003e (2019, R)\u003cbr\u003eRubric \u003cb\u003e82\u003c\u002fb\u003e\u002f100 | Audience 90.0% | Critics 99.0% | $326M adj\u003cbr\u003e\u003ci\u003eClass critique IS the film; aspiration to wealth is punished and the system itself\u003cbr\u003eindicted; nobody glorified; othering-by-smell is inclusion examined.\u003c\u002fi\u003e\u003cbr\u003e\u003cbr\u003e\u003cb\u003eWealth 36\u002f40\u003c\u002fb\u003e: Class critique is the film; aspiration punished\u003cbr\u003e\u003cb\u003eAgency 15\u002f17\u003c\u002fb\u003e: The Kims scheme brilliantly, then it collapses\u003cbr\u003e\u003cb\u003eCore 14\u002f17\u003c\u002fb\u003e: Dignity and the smell of poverty\u003cbr\u003e\u003cb\u003eMusic 5\u002f10\u003c\u002fb\u003e: Score\u003cbr\u003e\u003cb\u003eInclusion 7\u002f10\u003c\u002fb\u003e: Band 7\u002f10 (representation, not the lesson): othering-by-smell\u003cbr\u003eexamined; class contempt made visible\u003cbr\u003e\u003cb\u003eRomance 5\u002f6\u003c\u002fb\u003e: Peripheral","\u003cb\u003eTrainspotting\u003c\u002fb\u003e (1996, R)\u003cbr\u003eRubric \u003cb\u003e76\u003c\u002fb\u003e\u002f100 | Audience 93.0% | Critics 90.0% | $145M adj\u003cbr\u003e\u003ci\u003eWorking-class Edinburgh; addiction rendered with honesty; 'choose life' irony;\u003cbr\u003elegendary soundtrack; agency compromised by the subject itself.\u003c\u002fi\u003e\u003cbr\u003e\u003cbr\u003e\u003cb\u003eWealth 36\u002f40\u003c\u002fb\u003e: Working-class Edinburgh\u003cbr\u003e\u003cb\u003eAgency 12\u002f17\u003c\u002fb\u003e: Addiction compromises choice; Renton chooses life, ambiguously\u003cbr\u003e\u003cb\u003eCore 12\u002f17\u003c\u002fb\u003e: Addiction without varnish\u003cbr\u003e\u003cb\u003eMusic 9\u002f10\u003c\u002fb\u003e: Legendary soundtrack\u003cbr\u003e\u003cb\u003eInclusion 4\u002f10\u003c\u002fb\u003e: Band 4\u002f10 (homogeneous default \u002f missed opportunity): underclass\u003cbr\u003einteriority is real but the world is homogeneous and the Diane subplot ages badly\u003cbr\u003e\u003cb\u003eRomance 3\u002f6\u003c\u002fb\u003e: The Diane subplot is uncomfortable","\u003cb\u003eThere Will Be Blood\u003c\u002fb\u003e (2007, R)\u003cbr\u003eRubric \u003cb\u003e76\u003c\u002fb\u003e\u002f100 | Audience 86.0% | Critics 91.0% | $116M adj\u003cbr\u003e\u003ci\u003eSelf-made grind depicted BUT wealth accumulation as total soul-destruction - cinema's\u003cbr\u003eharshest ambition critique; isolation as the wage of greed.\u003c\u002fi\u003e\u003cbr\u003e\u003cbr\u003e\u003cb\u003eWealth 32\u002f40\u003c\u002fb\u003e: Self-made grind as soul-destruction; the harshest critique\u003cbr\u003e\u003cb\u003eAgency 16\u002f17\u003c\u002fb\u003e: Plainview wills everything into being\u003cbr\u003e\u003cb\u003eCore 13\u002f17\u003c\u002fb\u003e: Ambition's wage is isolation\u003cbr\u003e\u003cb\u003eMusic 5\u002f10\u003c\u002fb\u003e: Greenwood score\u003cbr\u003e\u003cb\u003eInclusion 4\u002f10\u003c\u002fb\u003e: Band 4\u002f10 (homogeneous default \u002f missed opportunity): misanthropic\u003cbr\u003eand homogeneous by design; nothing taught\u003cbr\u003e\u003cb\u003eRomance 6\u002f6\u003c\u002fb\u003e: None","\u003cb\u003eThe Big Lebowski\u003c\u002fb\u003e (1998, R)\u003cbr\u003eRubric \u003cb\u003e74\u003c\u002fb\u003e\u002f100 | Audience 94.0% | Critics 83.0% | $92M adj\u003cbr\u003e\u003ci\u003eThe Dude is the anti-wealth protagonist; the millionaire is a FRAUD (borrowed status,\u003cbr\u003eembezzled money); abiding over striving; low agency - things happen to him.\u003c\u002fi\u003e\u003cbr\u003e\u003cbr\u003e\u003cb\u003eWealth 38\u002f40\u003c\u002fb\u003e: The Dude is anti-wealth; the millionaire is a fraud\u003cbr\u003e\u003cb\u003eAgency 10\u002f17\u003c\u002fb\u003e: Things happen to him; he abides\u003cbr\u003e\u003cb\u003eCore 10\u002f17\u003c\u002fb\u003e: Abiding as philosophy, loosely\u003cbr\u003e\u003cb\u003eMusic 7\u002f10\u003c\u002fb\u003e: Dream-sequence soundtrack\u003cbr\u003e\u003cb\u003eInclusion 5\u002f10\u003c\u002fb\u003e: Band 5\u002f10 (neutral): neutral\u003cbr\u003e\u003cb\u003eRomance 4\u002f6\u003c\u002fb\u003e: Maude is transactional; odd","\u003cb\u003ePulp Fiction\u003c\u002fb\u003e (1994, R)\u003cbr\u003eRubric \u003cb\u003e72\u003c\u002fb\u003e\u002f100 | Audience 96.0% | Critics 92.0% | $456M adj\u003cbr\u003e\u003ci\u003eWorking criminals, no inherited status; Jules's redemption thread carries the core;\u003cbr\u003eiconic needle drops; morally chaotic but status-indifferent.\u003c\u002fi\u003e\u003cbr\u003e\u003cbr\u003e\u003cb\u003eWealth 34\u002f40\u003c\u002fb\u003e: Working criminals; status-indifferent\u003cbr\u003e\u003cb\u003eAgency 14\u002f17\u003c\u002fb\u003e: Jules chooses to walk the earth\u003cbr\u003e\u003cb\u003eCore 9\u002f17\u003c\u002fb\u003e: One redemption thread carries it\u003cbr\u003e\u003cb\u003eMusic 8\u002f10\u003c\u002fb\u003e: Iconic needle drops\u003cbr\u003e\u003cb\u003eInclusion 3\u002f10\u003c\u002fb\u003e: Band 3\u002f10 (harmful othering present): casual slurs and racialized\u003cbr\u003emenace present in the text, played for cool\u003cbr\u003e\u003cb\u003eRomance 4\u002f6\u003c\u002fb\u003e: The Mia chapter; moderate","\u003cb\u003eFight Club\u003c\u002fb\u003e (1999, R)\u003cbr\u003eRubric \u003cb\u003e71\u003c\u002fb\u003e\u002f100 | Audience 96.0% | Critics 81.0% | $192M adj\u003cbr\u003e\u003ci\u003eAnti-consumerism as thesis ('things you own end up owning you'); identity critique;\u003cbr\u003edocked on inclusion (insular masculinity) and romance framing.\u003c\u002fi\u003e\u003cbr\u003e\u003cbr\u003e\u003cb\u003eWealth 36\u002f40\u003c\u002fb\u003e: Anti-consumerism as thesis\u003cbr\u003e\u003cb\u003eAgency 13\u002f17\u003c\u002fb\u003e: The unreliable narrator undermines it\u003cbr\u003e\u003cb\u003eCore 12\u002f17\u003c\u002fb\u003e: Identity and masculinity critique\u003cbr\u003e\u003cb\u003eMusic 5\u002f10\u003c\u002fb\u003e: Pixies finale\u003cbr\u003e\u003cb\u003eInclusion 3\u002f10\u003c\u002fb\u003e: Band 3\u002f10 (harmful othering present): insular masculinity; Marla\u003cbr\u003eas a device; othering-lite present\u003cbr\u003e\u003cb\u003eRomance 2\u002f6\u003c\u002fb\u003e: The Marla framing is poor","\u003cb\u003eTitanic\u003c\u002fb\u003e (1997, PG-13)\u003cbr\u003eRubric \u003cb\u003e71\u003c\u002fb\u003e\u002f100 | Audience 69.0% | Critics 88.0% | $4483M adj\u003cbr\u003e\u003ci\u003eClass is the architecture: steerage vs first class, Cal is wealth-as-villainy, Rose\u003cbr\u003eREJECTS the gilded cage; romance central but she ultimately saves herself.\u003c\u002fi\u003e\u003cbr\u003e\u003cbr\u003e\u003cb\u003eWealth 30\u002f40\u003c\u002fb\u003e: Class is the architecture; Rose rejects the gilded cage\u003cbr\u003e\u003cb\u003eAgency 13\u002f17\u003c\u002fb\u003e: Rose chooses, twice\u003cbr\u003e\u003cb\u003eCore 12\u002f17\u003c\u002fb\u003e: Freedom versus suffocation\u003cbr\u003e\u003cb\u003eMusic 7\u002f10\u003c\u002fb\u003e: Horner, and that song\u003cbr\u003e\u003cb\u003eInclusion 6\u002f10\u003c\u002fb\u003e: Band 6\u002f10 (neutral): steerage humanized against first-class\u003cbr\u003econtempt; class empathy without a full lesson\u003cbr\u003e\u003cb\u003eRomance 3\u002f6\u003c\u002fb\u003e: Central romance; she saves herself","\u003cb\u003eForrest Gump\u003c\u002fb\u003e (1994, PG-13)\u003cbr\u003eRubric \u003cb\u003e68\u003c\u002fb\u003e\u002f100 | Audience 95.0% | Critics 71.0% | $1451M adj\u003cbr\u003e\u003ci\u003eOrdinary man indifferent to the fortune he stumbles into ('one less thing'); luck IS\u003cbr\u003ethe theme so agency is low; disability lead; Jenny framing mixed.\u003c\u002fi\u003e\u003cbr\u003e\u003cbr\u003e\u003cb\u003eWealth 30\u002f40\u003c\u002fb\u003e: Indifferent to a stumbled-upon fortune\u003cbr\u003e\u003cb\u003eAgency 8\u002f17\u003c\u002fb\u003e: Luck is the theme, so agency is low\u003cbr\u003e\u003cb\u003eCore 13\u002f17\u003c\u002fb\u003e: Devotion and decency\u003cbr\u003e\u003cb\u003eMusic 8\u002f10\u003c\u002fb\u0 function clampRange(r, b) {
    // shift a candidate range back inside the axis bounds (orientation-safe)
    if (!b) return r;
    var lo = Math.min(r[0], r[1]), hi = Math.max(r[0], r[1]), shift = 0;
    if (hi - lo >= b[1] - b[0]) return (r[0] < r[1]) ? [b[0], b[1]] : [b[1], b[0]];
    if (lo < b[0]) shift = b[0] - lo;
    else if (hi > b[1]) shift = b[1] - hi;
    return [r[0] + shift, r[1] + shift];

function updateLabels() {
    if (!FULL) FULL = fullRanges();
    var fl = gd._fullLayout;
    var xr = fl.xaxis.range, yr = fl.yaxis.range;
    var area = Math.abs((xr[1]-xr[0]) * (yr[1]-yr[0]));
    var fullArea = Math.abs((FULL.x[1]-FULL.x[0]) * (FULL.y[1]-FULL.y[0]));
    var areaFrac = Math.max(1e-6, area / fullArea);

    var budget = Math.round(45 / areaFrac);

    // only removed when (a) its point leaves the viewport, or (b) the user

    var zoomedOut = (PREV_AREA !== null && area > PREV_AREA * 1.001);
    PREV_AREA = area;
    if (zoomedOut) STICKY = {};

    // gather visible points across traces with their priority
    var vis = [], visSet = {};
    var src = gd._fullData || gd.data;
    src.forEach(function(ftr, ti) {
        var tr = gd.data[ti];
        if (!tr.customdata) return;   // legend-key traces carry no points
        if (ftr.visible === 'legendonly' || ftr.visible === false) return;
        var txs = Array.from(ftr.x), tys = Array.from(ftr.y);
        for (var i = 0; i < txs.length; i++) {
            if (txs[i] >= Math.min(xr[0],xr[1]) && txs[i] <= Math.max(xr[0],xr[1]) &&

                vis.push({ti: ti, i: i, prio: tr.customdata[i][1]});

    for (var fkey in FORCED) {

function lev(a, b) {
    var m = a.length, n = b.length;
    var row = [];
    for (var j = 0; j <= n; j++) row.push(j);
    for (var i = 1; i <= m; i++) {
        var prev = row[0]; row[0] = i;
        for (var k = 1; k <= n; k++) {
            var tmp = row[k];
            row[k] = Math.min(row[k] + 1, row[k - 1] + 1,
                              prev + (a[i - 1] === b[k - 1] ? 0 : 1));
            prev = tmp;
        }
    }
    return row[n];
}

function fuzzyHit(q) {
    // closest word-span of any title, tolerating ~1 typo per 3 characters
    var best = null, bestD = Math.max(2, Math.ceil(q.length * 0.34));
    TITLES.forEach(function(o) {
        var words = o.t.toLowerCase().split(/\s+/);
        for (var i = 0; i < words.length; i++) {
            var span = '';
            for (var j = i; j < words.length; j++) {
                span = span ? span + ' ' + words[j] : words[j];
                var d = lev(q, span);
                if (d < bestD) { bestD = d; best = o; }
            }
        }
    });
    return best;
}

function doSearch(q) {

    var res = document.getElementById('film-result');
    if (!q) { res.textContent = ''; return; }
    var fuzzy = false;
    var hit = TITLES.find(function(o) { return o.t.toLowerCase() === q; }) ||
              TITLES.find(function(o) { return o.t.toLowerCase().indexOf(q) === 0; }) ||
              TITLES.find(function(o) { return o.t.toLowerCase().indexOf(q) >= 0; });
    if (!hit) { hit = fuzzyHit(q); fuzzy = !!hit; }
    if (!hit) {
        res.textContent = 'Not on this chart: "' + q + '"';
        return;

    res.textContent = (fuzzy ? 'Closest match: ' : '') +
